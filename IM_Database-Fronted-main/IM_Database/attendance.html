<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Attendance - PUP Attendance System</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .attendance-container {
      max-width: 600px;
      margin: 50px auto;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .attendance-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .attendance-header h1 {
      color: #800000;
      margin-bottom: 10px;
    }

    .subject-info {
      background: #fff5f5;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }

    .subject-info h3 {
      color: #800000;
      margin: 0 0 5px 0;
    }

    .subject-info p {
      margin: 0;
      color: #555;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }

    .submit-btn {
      background: #800000;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background: #a52a2a;
    }

    .error-message {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .success-message {
      background: #e6ffed;
      color: #14532d;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="attendance-container">
    <div class="attendance-header">
      <h1>📝 Mark Attendance</h1>
      <p>Fill in your details to mark your attendance</p>
    </div>

    <div class="subject-info" id="subjectInfo">
      <h3 id="subjectName">Loading subject...</h3>
      <p id="subjectCode">Loading code...</p>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="attendanceForm">
      <div class="form-group">
        <label for="studentName">Full Name *</label>
        <input type="text" id="studentName" name="student_name" required placeholder="Enter your full name">
      </div>

      <div class="form-group">
        <label for="studentNumber">Student Number *</label>
        <input type="text" id="studentNumber" name="student_number" required placeholder="Enter your student number">
      </div>

      <div class="form-group">
        <label for="course">Course *</label>
        <input type="text" id="course" name="course" required placeholder="Enter your course">
      </div>

      <div class="form-group">
        <label for="yearLevel">Year Level *</label>
        <select id="yearLevel" name="year_level" required>
          <option value="">Select Year Level</option>
          <option value="1">1st Year</option>
          <option value="2">2nd Year</option>
          <option value="3">3rd Year</option>
          <option value="4">4th Year</option>
        </select>
      </div>

      <button type="submit" class="submit-btn">Submit Attendance</button>
    </form>
  </div>

  <script>
    // Get subject info from URL parameters
    const params = new URLSearchParams(window.location.search);
    const subject = params.get('subject');
    const code = params.get('code');

    if (subject && code) {
      document.getElementById('subjectName').textContent = subject;
      document.getElementById('subjectCode').textContent = code;
    } else {
      document.getElementById('subjectInfo').innerHTML = '<p style="color: red;">Invalid QR code. Please scan a valid QR code.</p>';
    }

    // Handle form submission
    document.getElementById('attendanceForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const studentName = document.getElementById('studentName').value;
      const studentNumber = document.getElementById('studentNumber').value;
      const course = document.getElementById('course').value;
      const yearLevel = document.getElementById('yearLevel').value;

      if (!subject || !code) {
        showError('Invalid subject information. Please scan a valid QR code.');
        return;
      }

      // Store attendance data in localStorage (for demo purposes)
      const attendanceData = {
        subject: subject,
        code: code,
        studentName: studentName,
        studentNumber: studentNumber,
        course: course,
        yearLevel: yearLevel,
        timestamp: new Date().toISOString()
      };

      // Get existing attendance records
      let attendanceRecords = JSON.parse(localStorage.getItem('attendanceRecords') || '[]');
      attendanceRecords.push(attendanceData);
      localStorage.setItem('attendanceRecords', JSON.stringify(attendanceRecords));

      showSuccess('Attendance marked successfully!');
      
      // Clear form
      document.getElementById('attendanceForm').reset();
      
      // Redirect after 2 seconds
      setTimeout(() => {
        window.location.href = 'student-dashboard.html';
      }, 2000);
    });

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      document.getElementById('successMessage').style.display = 'none';
    }

    function showSuccess(message) {
      const successDiv = document.getElementById('successMessage');
      successDiv.textContent = message;
      successDiv.style.display = 'block';
      document.getElementById('errorMessage').style.display = 'none';
    }
  </script>
</body>
</html>
