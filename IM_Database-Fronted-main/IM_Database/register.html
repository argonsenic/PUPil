<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - PUP Attendance System</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <h2>Create Your Account</h2>
    <div id="error-message" class="error-message" style="display:none; padding: 12px 16px; background:#fee2e2; color:#991b1b; border:1px solid #ef4444; border-radius:8px; margin-bottom:16px;">
    </div>
    <form action="auth/Register.php" method="POST">
      <input type="hidden" id="redirect" name="redirect" value="">
      <div class="form-group">
        <label for="username">Username *</label>
        <input type="text" id="username" name="username" required placeholder="Choose a username" />
      </div>

      <div class="form-group">
        <label for="role">Role *</label>
        <select id="role" name="role" required>
          <option value="student">Student</option>
          <option value="instructor">Instructor</option>
        </select>
      </div>

      <div class="form-group">
        <label for="password">Password *</label>
        <input type="password" id="password" name="password" required placeholder="Create a strong password" />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password *</label>
        <input type="password" id="confirmPassword" name="confirm_password" required placeholder="Re-enter your password" />
      </div>

      <div class="form-group">
        <label for="firstName">First Name *</label>
        <input type="text" id="firstName" name="first_name" required placeholder="Juan" />
      </div>

      <div class="form-group">
        <label for="lastName">Last Name *</label>
        <input type="text" id="lastName" name="last_name" required placeholder="Dela Cruz" />
      </div>

      <div class="form-group">
        <label for="middleName">Middle Name</label>
        <input type="text" id="middleName" name="middle_name" placeholder="Juan" />
      </div>

      <div class="form-group">
        <label for="suffixName">Suffix</label>
        <input type="text" id="suffixName" name="suffix_name" placeholder="Jr., Sr., III" />
      </div>

      <!-- Student-specific fields -->
      <div id="student-fields">
        <div class="form-group">
          <label for="course">Course *</label>
          <input type="text" id="course" name="course" placeholder="BS Information Technology" />
        </div>

        <div class="form-group">
          <label for="studentNumber">Student Number *</label>
          <input type="text" id="studentNumber" name="student_number" placeholder="e.g., 2023-10503-MN-0" />
        </div>

        <input type="hidden" name="section" value="2-5" />

        <div class="form-group">
          <label for="yearLevel">Year Level *</label>
          <select id="yearLevel" name="year_level">
            <option value="">Select Year Level</option>
            <option value="1">1st Year</option>
            <option value="2">2nd Year</option>
            <option value="3">3rd Year</option>
            <option value="4">4th Year</option>
          </select>
        </div>
      </div>

      <!-- Instructor-specific fields -->
      <div id="instructor-fields" style="display:none;">
        <div class="form-group">
          <label for="instructorId">Instructor ID *</label>
          <input type="text" id="instructorId" name="instructor_id" placeholder="Enter your instructor ID" />
        </div>
      </div>

      <div class="form-group">
        <label for="phoneNumber">Phone Number</label>
        <input type="text" id="phoneNumber" name="phone_number" placeholder="09123456789" />
      </div>

      <button type="submit" class="btn btn-center btn-block">Register Account</button>
    </form>

    <a href="login.html" class="link">Already have an account? Log in here</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    
    // Handle error message
    if (params.get('error')) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = decodeURIComponent(params.get('error'));
      errorDiv.style.display = 'block';
    }
    
    // Handle redirect parameter
    if (params.get('redirect')) {
      document.getElementById('redirect').value = decodeURIComponent(params.get('redirect'));
    }

    // Toggle fields based on role selection
    const roleSelect = document.getElementById('role');
    const studentFields = document.getElementById('student-fields');
    const instructorFields = document.getElementById('instructor-fields');
    const course = document.getElementById('course');
    const studentNumber = document.getElementById('studentNumber');
    const yearLevel = document.getElementById('yearLevel');
    const instructorId = document.getElementById('instructorId');

    roleSelect.addEventListener('change', function() {
      if (this.value === 'student') {
        studentFields.style.display = 'block';
        instructorFields.style.display = 'none';
        course.required = true;
        studentNumber.required = true;
        yearLevel.required = true;
        instructorId.required = false;
      } else if (this.value === 'instructor') {
        studentFields.style.display = 'none';
        instructorFields.style.display = 'block';
        course.required = false;
        studentNumber.required = false;
        yearLevel.required = false;
        instructorId.required = true;
      }
    });

    // Initialize with student fields visible
    roleSelect.dispatchEvent(new Event('change'));
  </script>
</body>
</html>
