<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Subjects | PUP Attendance</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/api.js"></script>
</head>
<body>
  <header>
    <div class="logo">PUPil Attendance System</div>
    <nav>
      <a href="main.html">My Subjects</a>
      <a href="profile.html">My Profile</a>
      <a href="login.html">Logout</a>
    </nav>
  </header>

  <div class="container">
    <h2>My Enrolled Subjects</h2>

    <!-- Scrollable container for subjects only -->
    <div class="subject-scroll-container" id="subjects-container">
      <div class="loading">Loading subjects...</div>
    </div>
  </div>

  <script>
    // Check authentication on page load
    document.addEventListener('DOMContentLoaded', async function() {
      if (!requireAuth()) {
        return; // Redirect to login if not authenticated
      }

      // Load user data and update UI
      const user = getUser();
      if (user) {
        console.log('Logged in user:', user);
      }

      // Load enrolled subjects from API
      const subjectsContainer = document.getElementById('subjects-container');
      
      try {
        if (user && user.profile) {
          const enrollments = await getEnrollments(user.profile.id);
          
          if (enrollments.success && enrollments.data.length > 0) {
            subjectsContainer.innerHTML = '';
            
            enrollments.data.forEach(enrollment => {
              const subjectItem = document.createElement('div');
              subjectItem.className = 'subject-item';
              
              const schedule = enrollment.schedule || 'Schedule not available';
              const section = enrollment.section || 'N/A';
              
              subjectItem.innerHTML = `
                <div class="subject-details">
                  <h3>${enrollment.subject_name}</h3>
                  <p>Section: ${section}</p>
                  <p>Schedule: ${schedule}</p>
                </div>
                <a href="qr-page.html?subject_id=${encodeURIComponent(enrollment.subject_id)}&subject=${encodeURIComponent(enrollment.subject_name)}&section=${encodeURIComponent(section)}&schedule=${encodeURIComponent(schedule)}" class="btn">View QR Code</a>
              `;
              
              subjectsContainer.appendChild(subjectItem);
            });
          } else {
            subjectsContainer.innerHTML = '<div class="no-subjects">No enrolled subjects found.</div>';
          }
        } else {
          subjectsContainer.innerHTML = '<div class="error">Unable to load user information.</div>';
        }
      } catch (error) {
        console.error('Error loading subjects:', error);
        subjectsContainer.innerHTML = '<div class="error">Failed to load subjects. Please try again.</div>';
      }
    });
  </script>
</body>
</html>
