<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | PUP Attendance</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/api.js"></script>
</head>
<body class="auth-page">
  <div class="auth-container">
    <h2>📚 Login to Your Account</h2>
    <form>
      <input type="text" placeholder="Student ID / Email" required>
      <input type="password" placeholder="Password" required>
      <button type="submit" class="btn">Login</button>
    </form>
    <a href="register.html" class="link">Don't have an account? Register here</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const returnUrl = params.get('returnUrl') || 'main.html';

    document.querySelector("form").addEventListener("submit", async function(e) {
      e.preventDefault();

      const username = document.querySelector("input[type='text']").value;
      const password = document.querySelector("input[type='password']").value;

      try {
        const result = await login(username, password);

        if (result.success) {
          alert("✅ Login successful!");
          window.location.href = returnUrl;
        } else {
          alert("❌ " + result.message);
        }
      } catch (error) {
        console.error("Login error:", error);
        alert("❌ Login failed. Please try again.");
      }
    });
  </script>
</body>
</html>
