<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - PUP Attendance System</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/api.js"></script>
</head>
<body class="auth-page">
  <div class="auth-container">
    <h2>Create Your Account</h2>
    <form id="registerForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="Choose a username" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Create a strong password" />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Re-enter your password" />
      </div>

      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" name="firstName" required placeholder="Juan" />
      </div>

      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" required placeholder="Dela Cruz" />
      </div>

      <div class="form-group">
        <label for="course">Course</label>
        <input type="text" id="course" name="course" required placeholder="BS Information Technology" />
      </div>

      <div class="form-group">
        <label for="yearLevel">Year Level</label>
        <select id="yearLevel" name="yearLevel" required>
          <option value="">Select Year Level</option>
          <option value="1">1st Year</option>
          <option value="2">2nd Year</option>
          <option value="3">3rd Year</option>
          <option value="4">4th Year</option>
        </select>
      </div>

      <button type="submit" class="btn btn-center btn-block">Register Account</button>
    </form>

    <a href="login.html" class="link">Already have an account? Log in here</a>
  </div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        alert("❌ Passwords do not match! Please try again.");
        return;
      }

      // Collect form data
      const newUser = {
        username: document.getElementById("username").value,
        password: password,
        first_name: document.getElementById("firstName").value,
        last_name: document.getElementById("lastName").value,
        course: document.getElementById("course").value,
        year_level: parseInt(document.getElementById("yearLevel").value)
      };

      try {
        const result = await register(newUser);

        if (result.success) {
          alert("✅ Account created successfully! You can now log in.");
          window.location.href = "login.html";
        } else {
          alert("❌ " + result.message);
        }
      } catch (error) {
        console.error("Registration error:", error);
        alert("❌ Registration failed. Please try again.");
      }
    });
  </script>
</body>
</html>
